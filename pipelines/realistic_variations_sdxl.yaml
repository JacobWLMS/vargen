name: "Realistic NSFW Variations (SDXL)"
description: "Generate realistic NSFW variations using SDXL Pony checkpoint"
version: 1
author: "jacob"
tags: ["nsfw", "realistic", "portrait", "sdxl", "pony"]

models:
  qwen-vl:
    repo: "huchukato/Qwen3-VL-8B-Instruct-Abliterated"
    vram_mb: 4800

  pony-xl:
    repo: "local"
    file: "gonzalomoXLFluxPony_v60PhotoXLDMD.safetensors"
    source: "huggingface"
    vram_mb: 6500

  realesrgan:
    repo: "Comfy-Org/Real-ESRGAN_repackaged"
    file: "RealESRGAN_x4plus.safetensors"
    vram_mb: 100

steps:
  - name: caption
    type: vision-llm
    model: qwen-vl
    prompt: "Describe this person in complete detail including their appearance, pose, expression, clothing, and setting"
    prepend: "score_9, score_8_up, score_7_up, nsfw, nude, uncensored, professional photograph, natural lighting, photorealistic, anatomically correct, detailed hands, five fingers per hand"
    append: "8k resolution, ultra detailed, sharp focus, natural skin pores, raw photo"
    max_tokens: 512

  - name: generate
    type: txt2img
    model: pony-xl
    architecture: sdxl
    prompt: "{caption}"
    negative: "score_1, score_2, score_3, blurry, low quality, distorted, deformed, watermark, text, cartoon, anime, censored, mosaic, pixelated, ugly, disfigured, extra limbs, bad anatomy, deformed hands, extra fingers, missing fingers, fused fingers, bad hands, cropped, worst quality"
    width: 1024
    height: 1024
    steps: 4
    guidance: 1.5
    seed: -1

  - name: upscale
    type: pixel-upscale
    model: realesrgan
    input: "{generate}"
    scale: 2
