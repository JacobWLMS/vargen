name: "Portrait — Artistic / Editorial"
description: "Generate an artistic editorial-style variation with creative lighting and composition"
version: 1
tags: ["nsfw", "portrait", "artistic", "editorial", "flux"]

models:
  qwen-vl:
    repo: "Qwen/Qwen2.5-VL-7B-Instruct"
    vram_mb: 4800

  flux-dev:
    repo: "city96/FLUX.1-dev-gguf"
    file: "flux1-dev-Q4_K_S.gguf"
    format: gguf
    vram_mb: 5300

  realesrgan:
    repo: "Comfy-Org/Real-ESRGAN_repackaged"
    file: "RealESRGAN_x4plus.safetensors"
    vram_mb: 100

steps:
  - name: caption
    type: vision-llm
    model: qwen-vl
    prompt: "Describe this person's physical appearance, face, body type, and hair in detail. Do not describe the background or clothing."
    prepend: "nsfw, nude, uncensored, fashion editorial photograph, avant-garde composition, dramatic neon lighting, wet skin, creative pose, photorealistic, anatomically correct, detailed hands"
    append: "8k, cinematic color grading, high fashion, vogue style, ultra detailed, sharp focus"
    max_tokens: 512

  - name: generate
    type: txt2img
    model: flux-dev
    prompt: "{caption}"
    negative: "blurry, distorted, deformed, cartoon, anime, censored, bad anatomy, bad hands, extra fingers, boring, plain background, passport photo"
    width: 1024
    height: 1024
    steps: 20
    guidance: 3.5
    seed: -1

  - name: upscale
    type: pixel-upscale
    model: realesrgan
    input: "{generate}"
    scale: 2
