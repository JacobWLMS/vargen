name: "Realistic NSFW Variations"
description: "Generate realistic NSFW variations of a human subject"
version: 1
author: "jacob"
tags: ["nsfw", "realistic", "portrait", "variations"]

models:
  qwen-vl:
    repo: "Qwen/Qwen2.5-VL-7B-Instruct"
    vram_mb: 4800

  flux-dev:
    repo: "city96/FLUX.1-dev-gguf"
    file: "flux1-dev-Q4_K_S.gguf"
    format: gguf
    vram_mb: 5300

  realesrgan:
    repo: "Comfy-Org/Real-ESRGAN_repackaged"
    file: "RealESRGAN_x4plus.safetensors"
    vram_mb: 100

steps:
  - name: caption
    type: vision-llm
    model: qwen-vl
    prompt: "Describe this person in complete detail including their appearance, pose, expression, clothing, and setting"
    prepend: "nsfw, nude, uncensored, professional photograph, natural lighting, photorealistic, anatomically correct, detailed hands, five fingers per hand"
    append: "8k resolution, ultra detailed, sharp focus, natural skin pores, raw photo"
    max_tokens: 512

  - name: generate
    type: txt2img
    model: flux-dev
    prompt: "{caption}"
    negative: "blurry, low quality, distorted, deformed, watermark, text, cartoon, anime, censored, mosaic, pixelated, ugly, disfigured, extra limbs, bad anatomy, deformed hands, extra fingers, missing fingers, fused fingers, bad hands, cropped, worst quality"
    width: 1024
    height: 1024
    steps: 20
    guidance: 3.5
    seed: -1

  - name: upscale
    type: pixel-upscale
    model: realesrgan
    input: "{generate}"
    scale: 2
