<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VarGen — Daily Puzzles</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
</head>
<body>
  <!-- Hamburger Menu Overlay -->
  <div id="menu-overlay" class="hidden" aria-hidden="true"></div>
  <nav id="sidebar" class="closed" aria-label="Game selection">
    <div class="sidebar-header">
      <h2>VarGen</h2>
      <span class="sidebar-sub">Daily Puzzles</span>
    </div>
    <div class="sidebar-games" id="sidebar-games">
      <!-- Rendered by JS -->
    </div>
    <div class="sidebar-footer">
      <button id="sidebar-stats-btn" class="sidebar-link">Statistics</button>
    </div>
  </nav>

  <div id="app">
    <header>
      <button id="btn-menu" class="icon-btn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect y="3" width="20" height="2" rx="1" fill="currentColor"/><rect y="9" width="20" height="2" rx="1" fill="currentColor"/><rect y="15" width="20" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <h1 id="header-title">VarGen</h1>
      <div class="header-right">
        <button id="btn-help" class="icon-btn" aria-label="How to play">?</button>
        <button id="btn-stats" class="icon-btn" aria-label="Statistics">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="10" width="3" height="7" rx="0.5" fill="currentColor"/><rect x="5.5" y="6" width="3" height="11" rx="0.5" fill="currentColor"/><rect x="10" y="3" width="3" height="14" rx="0.5" fill="currentColor"/><rect x="14.5" y="1" width="3" height="16" rx="0.5" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <p id="tagline"></p>

    <div id="game-container">
      <!-- Active game renders here -->
    </div>

    <div id="toast-container"></div>
  </div>

  <!-- Help Modal -->
  <div id="modal-help" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="help-body">
        <!-- Filled by active game -->
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="modal-stats" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2>Statistics</h2>
      <div id="stats-game-label" style="color:#818384;font-size:0.8rem;margin-bottom:8px;"></div>
      <div id="stats-body">
        <div class="stat-item">
          <div class="stat-num" id="stat-played">0</div>
          <div class="stat-label">Played</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-win-pct">0</div>
          <div class="stat-label">Win %</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-streak">0</div>
          <div class="stat-label">Streak</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-max-streak">0</div>
          <div class="stat-label">Max Streak</div>
        </div>
      </div>
      <h3>Guess Distribution</h3>
      <div id="distribution"></div>
      <div id="share-section" class="hidden">
        <button id="btn-share" class="action-btn primary">Share Results</button>
      </div>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="shared.js"></script>
  <script src="game-pool.js"></script>
  <script src="game-cipher.js"></script>
  <script src="game-grid.js"></script>
  <script src="game-chain.js"></script>
  <script src="game-chromax.js"></script>
  <script src="game-signals.js"></script>
  <script src="game-memory.js"></script>
  <script src="router.js"></script>
</body>
</html>
